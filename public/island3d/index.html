<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #BEE3F0; font-family: -apple-system, system-ui, sans-serif; touch-action: none; }
  /* THE DV BRIGHT LINE — native DOM, above the canvas, always (the law) */
  #crisis { position: fixed; top: 0; left: 0; right: 0; z-index: 50; background: rgba(255,255,255,0.96);
            font-size: 10px; text-align: center; padding: 4px 8px; color: #334; border-bottom: 1px solid #e5e7eb; }
  #crisis a { color: #C0392B; font-weight: 800; text-decoration: none; }
  #hud { position: fixed; top: 30px; left: 10px; z-index: 40; display: flex; gap: 6px; align-items: center; }
  .pill { background: rgba(255,255,255,0.92); border: none; border-radius: 999px; padding: 8px 14px;
          font-size: 11px; font-weight: 800; color: #374151; box-shadow: 0 2px 8px rgba(0,0,0,0.12); cursor: pointer; }
  #stick { position: fixed; bottom: 26px; left: 22px; width: 116px; height: 116px; border-radius: 50%;
           background: rgba(255,255,255,0.18); border: 2px solid rgba(255,255,255,0.5); z-index: 40; backdrop-filter: blur(2px); }
  #nub { position: absolute; left: 50%; top: 50%; width: 48px; height: 48px; border-radius: 50%;
         background: rgba(255,255,255,0.75); transform: translate(-50%, -50%); }
  #say { position: fixed; left: 50%; bottom: 158px; transform: translateX(-50%); z-index: 45; max-width: 78%;
         background: #fff; border-radius: 18px; padding: 10px 16px; font-size: 12.5px; font-weight: 700; color: #334;
         box-shadow: 0 4px 16px rgba(0,0,0,0.18); display: none; text-align: center; line-height: 1.45; }
  #say b { color: #B8860B; display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
  /* z above #jump (46) — the open picker must win the corner it shares with the thumb
     button; 13 castaways now live here, so it scrolls instead of running off a phone */
  #fit { position: fixed; right: 12px; bottom: 26px; z-index: 47; display: none; flex-direction: column; gap: 8px;
         max-height: min(62vh, 560px); overflow-y: auto;
         background: rgba(255,255,255,0.94); border-radius: 20px; padding: 14px; box-shadow: 0 4px 16px rgba(0,0,0,0.18); }
  #fit h4 { margin: 0 0 2px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: #9CA3AF; }
  .swatches { display: flex; gap: 6px; }
  .sw { width: 26px; height: 26px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
  .sw.on { border-color: #0E7C7C; }
  #hint { position: fixed; left: 50%; top: 68px; transform: translateX(-50%); z-index: 40; background: rgba(0,0,0,0.35);
          color: #fff; font-size: 10.5px; font-weight: 700; border-radius: 14px; padding: 6px 14px; text-align: center; max-width: 86%;
          pointer-events: none; transition: opacity 1s; }
</style>

<body>
<!-- ═══════════════════════════════════════════════════════════════════════════
     THE ISLAND IN THREE DIMENSIONS — D3D-1 first light (pulled forward by the
     captain, 2026-07-11). The Horizon-Worlds-mobile experience, owned:
     third-person avatar, thumb-stick, pastel fog, flat-shaded island — built
     on the house's proven single-file Three.js pattern (same importmap as the
     three shipped worlds). Same-origin with Driftwood: the castaway, the
     avatar fit, and the Gathering all read the app's own keys.

     THE LAWS RIDE ALONG: the DV strip is DOM above the canvas (a renderer
     hang can never bury it) · positions are play, never persisted · presence
     shows who is here, never who isn't · the Jumble are honest robots.
     ═══════════════════════════════════════════════════════════════════════ -->
<!-- Crisis/safety info lives in the app: Settings → Safety & Crisis (therapist-configured, 2026-07-12 law). -->
<div id="hud">
  <button class="pill" id="back">← the shore</button>

</div>
<!-- THE BUILDER'S PALETTE — tap a material, tap the world; ⛏ breaks -->
<div id="palette" style="display:none;position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:46;background:rgba(255,255,255,0.94);border-radius:20px;padding:8px 10px;box-shadow:0 4px 16px rgba(0,0,0,0.2);gap:6px;align-items:center"></div>
<button id="jump" style="display:none;position:fixed;right:20px;bottom:150px;z-index:46;width:64px;height:64px;border-radius:50%;border:2px solid rgba(255,255,255,0.6);background:rgba(255,255,255,0.35);font-size:24px;backdrop-filter:blur(2px)">⤴️</button>
<div id="hint">drag to look · stick or WASD to walk · ⤴️ hop · 🔨 build anything · find the 40 shells</div>
<div id="say"><b id="sayName"></b><span id="sayLine"></span></div>
<div id="stick"><div id="nub"></div></div>
<div id="fit">
  <h4>character</h4><div class="swatches" id="chars" style="flex-direction:column;align-items:stretch;gap:6px"></div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.134.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { mergeBufferGeometries } from 'three/addons/utils/BufferGeometryUtils.js';

// ── who am I (the app's own keys, same origin) ───────────────────────────────
let me = { id: 'castaway-1', name: 'Castaway' };
try { const u = JSON.parse(localStorage.getItem('driftwood_active_castaway_v1') || 'null'); if (u?.id) me = u; } catch {}
const FIT_KEY = 'driftwood_avatar_v1';
// (avatar customization is now a real-mesh character picker — see AVATARS below)

// ── scene: the Horizon-mobile weather ────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xBEE3F0);
scene.fog = new THREE.Fog(0xC9E9F2, 60, 320);
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 900);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);
addEventListener('resize', () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });

scene.add(new THREE.HemisphereLight(0xFFFDF5, 0xCBB489, 0.78));
const sun = new THREE.DirectionalLight(0xFFF0CE, 0.95);
sun.position.set(30, 50, -20);
scene.add(sun);

// ── THE BIG ISLAND — the VR island's proven terrain recipe, scaled up ────────
// islandHeight() is the same heightfield law the Quest-proven island uses
// (smoothstep beach ring, noisy interior shelf, a rocky spine), at 3× the
// radius: a world you can genuinely hike. Lance's own 4K textures (the sand
// ripples, the mossy rock, the island's rock) paint it via a splat blend
// injected into ONE MeshLambertMaterial (onBeforeCompile) — lighting and fog
// stay stock, phones pay one draw call for the whole ground.
const mat = (c) => new THREE.MeshLambertMaterial({ color: c });
const ISLAND_R = 110;
const SEA_Y = 0;                          // sea level; beach crests ~+0.9
function smoothNoise(x, z) {
  return Math.sin(x * 0.055) * Math.cos(z * 0.047) + Math.sin(x * 0.021 + z * 0.033) * 1.6;
}
function islandHeight(x, z) {
  const r = Math.hypot(x, z);
  if (r > ISLAND_R + 26) return -6;                                            // seabed
  const edge  = 1 - THREE.MathUtils.smoothstep(r, ISLAND_R - 12, ISLAND_R + 20); // 1 land → 0 sea
  const shore = 1 - THREE.MathUtils.smoothstep(r, ISLAND_R - 55, ISLAND_R - 8);  // 1 inland → 0 beach
  let h = -5 + edge * 5.9;                                                     // beach at ~+0.9
  h += shore * (7 + smoothNoise(x, z) * 2.4);                                  // jungle shelf
  // the rocky spine (northwest highlands — the Collier's forge country)
  const spine = Math.exp(-Math.pow((x + 40) / 55, 2)) * Math.exp(-Math.pow((z + 55) / 70, 2));
  h += spine * 26 * shore;
  return h;
}
// ground height clamped to walkable land (players never sink under the sea)
const groundY = (x, z) => Math.max(islandHeight(x, z), SEA_Y + 0.25);

// the terrain mesh
const texLoader = new THREE.TextureLoader();
const tile = (url, rep) => { const t = texLoader.load(url); t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(rep, rep); return t; };
const texSand  = tile('/island3d/tex/sand.jpg', 170);
const texGrass = tile('/island3d/tex/grass.jpg', 150);   // Lance's real tropical grass — the jungle floor
const texRock  = tile('/island3d/tex/rock.jpg', 110);
const terrainGeo = new THREE.PlaneGeometry(ISLAND_R * 2 + 60, ISLAND_R * 2 + 60, 160, 160);
terrainGeo.rotateX(-Math.PI / 2);
{
  const pos = terrainGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) pos.setY(i, islandHeight(pos.getX(i), pos.getZ(i)));
  terrainGeo.computeVertexNormals();
}
// splat: sand (beach) low → grass (jungle floor) mid → rock high/steep, one material
const terrainMat = new THREE.MeshLambertMaterial({ map: texSand });
terrainMat.onBeforeCompile = (shader) => {
  shader.uniforms.tGrass = { value: texGrass };
  shader.uniforms.tRock = { value: texRock };
  shader.vertexShader = shader.vertexShader
    .replace('#include <common>', '#include <common>\nvarying vec3 vWPos;')
    .replace('#include <worldpos_vertex>', '#include <worldpos_vertex>\nvWPos = (modelMatrix * vec4(transformed, 1.0)).xyz;');
  shader.fragmentShader = shader.fragmentShader
    .replace('#include <common>', '#include <common>\nuniform sampler2D tGrass;\nuniform sampler2D tRock;\nvarying vec3 vWPos;')
    .replace('#include <map_fragment>', `
      // two-scale sampling (second sample ROTATED 90°) kills tile periodicity
      vec4 cSand  = mix(texture2D(map, vUv),           texture2D(map, vUv.yx * 0.23 + 0.37),  0.5);
      vec4 cGrass = mix(texture2D(tGrass, vUv * 0.9),  texture2D(tGrass, vUv.yx * 0.21 + 0.53), 0.5);
      cGrass.rgb *= vec3(0.80, 0.84, 0.74);   // 2026-07-16: pull the neon out of the midband
      vec4 cRock  = mix(texture2D(tRock, vUv * 0.66),  texture2D(tRock, vUv.yx * 0.15 + 0.11), 0.5);
      // organic band edges: world-noise wobbles the height thresholds
      float wob = sin(vWPos.x * 0.19) * sin(vWPos.z * 0.17) * 1.4
                + sin(vWPos.x * 0.043 + vWPos.z * 0.051) * 2.2;
      float grassMix = smoothstep(1.2, 6.0, vWPos.y + wob);   // beach → jungle floor
      float rockMix  = smoothstep(9.5, 17.5, vWPos.y + wob);  // shelf → highlands
      vec4 sampledDiffuseColor = mix(mix(cSand, cGrass, grassMix), cRock, rockMix);
      diffuseColor *= sampledDiffuseColor;
    `);
};
const terrain = new THREE.Mesh(terrainGeo, terrainMat);
scene.add(terrain);

// living water — Lance's real turquoise, drifting slowly, with vertex swell
const waterGeo = new THREE.PlaneGeometry(900, 900, 48, 48);
const texWater = tile('/island3d/tex/water.jpg', 26);
const water = new THREE.Mesh(waterGeo, new THREE.MeshLambertMaterial({ map: texWater, transparent: true, opacity: 0.86 }));
water.rotation.x = -Math.PI / 2; water.position.y = SEA_Y;
scene.add(water);
const waterBase = Float32Array.from(waterGeo.attributes.position.array);

// a gradient sky dome — richer than flat fog, the pastel Horizon ceiling
const skyGeo = new THREE.SphereGeometry(600, 24, 16);
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide, depthWrite: false,
  uniforms: { top: { value: new THREE.Color(0x8FC7E8) }, bottom: { value: new THREE.Color(0xEAF6FA) } },
  vertexShader: 'varying vec3 vP; void main(){ vP = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }',
  fragmentShader: 'varying vec3 vP; uniform vec3 top; uniform vec3 bottom; void main(){ float h = clamp((normalize(vP).y+0.15)/0.9, 0.0, 1.0); gl_FragColor = vec4(mix(bottom, top, h), 1.0); }',
});
const sky = new THREE.Mesh(skyGeo, skyMat);
scene.add(sky);
// LANCE'S SKY — his real skies wrap the dome the moment they load (the
// gradient stands honest until then / if they're missing). The island keeps
// the family's clock: his blue morning by day, his sunset panorama from late
// afternoon on (the Saturday-night island). Horizon math: the photo's bottom
// edge lands AT the dome's horizon (v=0.5), clamping below it; mirrored wrap
// hides the 360° seam.
const hourNow = new Date().getHours();
const skyPhase = (hourNow >= 7 && hourNow < 16) ? 'day' : (hourNow >= 16 && hourNow < 21) ? 'sunset' : 'night';
const SKY_TEX = { day: '/island3d/tex/sky-day.jpg', sunset: '/island3d/tex/sky-sunset.jpg', night: '/island3d/tex/sky-night.jpg' };
texLoader.load(SKY_TEX[skyPhase], t => {
  t.wrapS = THREE.MirroredRepeatWrapping; t.wrapT = THREE.ClampToEdgeWrapping;
  t.repeat.set(2, 2); t.offset.y = -1;
  // fog:false — the dome sits far past fog-far and would flatten to fog color
  sky.material = new THREE.MeshBasicMaterial({ map: t, side: THREE.BackSide, depthWrite: false, fog: false });
  if (skyPhase === 'sunset') {
    // golden-hour weather to match the sunset photograph
    scene.fog.color.set(0xEBD9C6);
    scene.background = new THREE.Color(0xF2DFC9);
    sun.color.set(0xFFD9A0);
  } else if (skyPhase === 'night') {
    // Lance's stars over a moonlit island: the fire becomes the hearth light
    scene.fog.color.set(0x1A2430);
    scene.background = new THREE.Color(0x141C28);
    sun.color.set(0x9FB6D8); sun.intensity = 0.35;
    fireBoost = 0.8; fireLight.distance += 6;
  }
});

// drifting clouds — soft billboards on the horizon
const cloudTex = (() => {
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const x = c.getContext('2d');
  const g = x.createRadialGradient(64, 64, 8, 64, 64, 62);
  g.addColorStop(0, 'rgba(255,255,255,0.95)'); g.addColorStop(1, 'rgba(255,255,255,0)');
  x.fillStyle = g; x.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(c);
})();
const clouds = [];
for (let i = 0; i < 9; i++) {
  const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: cloudTex, transparent: true, opacity: 0.8, depthWrite: false }));
  const a = (i / 9) * Math.PI * 2;
  s.position.set(Math.cos(a) * 320, 90 + Math.random() * 60, Math.sin(a) * 320);
  s.scale.set(130 + Math.random() * 80, 55 + Math.random() * 26, 1);
  clouds.push(s); scene.add(s);
}

// ── THE JUNGLE — instanced, phone-cheap, thousands of plants in 6 draw calls ─
// Deterministic scatter (seeded) so every family member sees the same island.
let seed = 42;
const rand = () => { seed = (seed * 16807) % 2147483647; return (seed - 1) / 2147483646; };
function scatterOn(count, fits) {
  const spots = [];
  let guard = count * 40;
  while (spots.length < count && guard-- > 0) {
    const a = rand() * Math.PI * 2, rr = Math.sqrt(rand()) * (ISLAND_R - 6);
    const x = Math.cos(a) * rr, z = Math.sin(a) * rr;
    const h = islandHeight(x, z);
    if (fits(h, x, z)) spots.push({ x, z, h });
  }
  return spots;
}
const dummy = new THREE.Object3D();
function instancedScatter(geo, material, spots, place) {
  const m = new THREE.InstancedMesh(geo, material, spots.length);
  spots.forEach((s, i) => { place(dummy, s, i); dummy.updateMatrix(); m.setMatrixAt(i, dummy.matrix); });
  m.instanceMatrix.needsUpdate = true;
  scene.add(m);
  return m;
}
// palm trunks + fronds (beach ring + scattered inland): two instanced meshes
// — trunks wear Lance's real bark now
const texBark = tile('/island3d/tex/bark.jpg', 1);
const barkMat = new THREE.MeshLambertMaterial({ map: texBark });
const palmSpots = scatterOn(90, h => h > 0.6 && h < 7);
instancedScatter(new THREE.CylinderGeometry(0.16, 0.34, 7, 6), barkMat, palmSpots, (d, s) => {
  d.position.set(s.x, s.h + 3.2, s.z);
  d.rotation.set(0, rand() * Math.PI * 2, (rand() - 0.5) * 0.3);
  d.scale.setScalar(0.8 + rand() * 0.5);
});
// THE PHOTOREAL FRONDS (2026-07-16, Lance's commission): a real coconut
// frond, keyed to alpha, on a horizontal plane per frond — six per crown,
// drooping outward. One InstancedMesh; the flat green cones are retired.
const frondSpots = [];
for (const s of palmSpots) for (let i = 0; i < 6; i++) frondSpots.push({ ...s, fi: i });
const frondGeo = (() => {
  const g = new THREE.PlaneGeometry(4.2, 4.2);
  g.rotateX(-Math.PI / 2);   // lie flat, facing up; blade runs +x
  g.translate(1.8, 0, 0);    // stem at the origin (the crown)
  return g;
})();
const frondMat = new THREE.MeshLambertMaterial({
  map: texLoader.load('/island3d/tex/frond.png'),
  alphaTest: 0.4, side: THREE.DoubleSide,
});
instancedScatter(frondGeo, frondMat, frondSpots, (d, s) => {
  d.position.set(s.x, s.h + 6.9, s.z);
  d.rotation.order = 'YZX';
  d.rotation.set(0, (s.fi / 6) * Math.PI * 2 + rand() * 0.5, -(0.35 + rand() * 0.3));
  d.scale.setScalar(0.85 + rand() * 0.4);
});
// jungle canopy trees (the deep interior): trunk + REAL leaf mass — the
// canopy spheres now wear the photographed foliage tile, tinted two ways so
// the jungle isn't one green.
const texFoliage = tile('/island3d/tex/foliage.jpg', 2);
const foliageMat  = new THREE.MeshLambertMaterial({ map: texFoliage });
const foliageMat2 = new THREE.MeshLambertMaterial({ map: texFoliage, color: 0xC9E8B9 });
const treeSpots = scatterOn(160, h => h > 3.5 && h < 13);
instancedScatter(new THREE.CylinderGeometry(0.3, 0.5, 5, 6), barkMat, treeSpots, (d, s) => {
  d.position.set(s.x, s.h + 2.2, s.z);
  d.scale.setScalar(0.8 + rand() * 0.8);
});
instancedScatter(new THREE.SphereGeometry(2.6, 10, 8), foliageMat, treeSpots, (d, s, i) => {
  d.position.set(s.x, s.h + 6 + (i % 3) * 0.5, s.z);
  d.rotation.y = rand() * Math.PI * 2;
  d.scale.set(1 + rand() * 0.7, 0.75 + rand() * 0.4, 1 + rand() * 0.7);
});
instancedScatter(new THREE.SphereGeometry(1.7, 9, 7), foliageMat2, treeSpots, (d, s) => {
  d.position.set(s.x + (rand() - 0.5) * 2.4, s.h + 7.4, s.z + (rand() - 0.5) * 2.4);
  d.rotation.y = rand() * Math.PI * 2;
  d.scale.set(0.9 + rand() * 0.5, 0.6 + rand() * 0.3, 0.9 + rand() * 0.5);
});
// ferns (undergrowth) + boulders (the spine wears the real granite)
instancedScatter(new THREE.ConeGeometry(0.5, 1.1, 6), foliageMat, scatterOn(240, h => h > 3 && h < 11), (d, s) => {
  d.position.set(s.x, s.h + 0.4, s.z);
  d.rotation.y = rand() * Math.PI;
  d.scale.setScalar(0.7 + rand());
});
instancedScatter(new THREE.DodecahedronGeometry(1.3, 0), new THREE.MeshLambertMaterial({ map: texRock }), scatterOn(70, h => h > 8), (d, s) => {
  d.position.set(s.x, s.h + 0.4, s.z);
  d.rotation.set(rand() * Math.PI, rand() * Math.PI, 0);
  d.scale.setScalar(0.6 + rand() * 2.2);
});
// LANCE'S BUSHES — his real foliage cutouts on crossed billboards. Three
// textures, three InstancedMeshes: ~165 photographic palms for 3 draw calls.
const bushGeo = (() => {
  const p1 = new THREE.PlaneGeometry(2.6, 1.9); p1.translate(0, 0.9, 0);
  const p2 = p1.clone(); p2.rotateY(Math.PI / 2);
  return mergeBufferGeometries([p1, p2]);
})();
for (const b of ['bush1', 'bush2', 'bush3']) {
  const t = texLoader.load(`/island3d/tex/${b}.png`);
  const bm = new THREE.MeshLambertMaterial({ map: t, alphaTest: 0.5, side: THREE.DoubleSide });
  instancedScatter(bushGeo, bm, scatterOn(55, h => h > 1.2 && h < 10.5), (d, s) => {
    d.position.set(s.x, s.h - 0.05, s.z);
    d.rotation.set(0, rand() * Math.PI, 0);
    d.scale.setScalar(0.7 + rand() * 0.9);
  });
}
// driftwood logs along the tide line — wearing Lance's real driftwood grain
instancedScatter(new THREE.CylinderGeometry(0.3, 0.4, 4.6, 7), new THREE.MeshLambertMaterial({ map: tile('/island3d/tex/grain.jpg', 1) }), scatterOn(40, h => h > 0.5 && h < 1.6), (d, s) => {
  d.position.set(s.x, s.h + 0.3, s.z);
  d.rotation.set(0, rand() * Math.PI, Math.PI / 2);
});
// the camp: fire + tent + rowboat
// THE FIRE THE FAMILY BUILT — every conjoint act this week (fire_quiz_played:
// every campfire game round) laid a real log. The island reads the week and
// burns accordingly: more logs in the teepee, a taller flame, a wider glow.
// This is the reconnection loop made visible — Saturday's island shows the
// warmth the family earned Monday through Friday.
let warmth = 0;
try {
  const evs = JSON.parse(localStorage.getItem('driftwood_events_v1') || '[]');
  warmth = Math.min(evs.filter(e => e && e.action === 'fire_quiz_played').length, 24);
} catch { /* a cold start is still a start */ }
const fire = new THREE.Group();
const logCount = 4 + Math.floor(warmth / 2);           // 4 sticks cold → 16 at full warmth
for (let i = 0; i < logCount; i++) {
  const stick = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.09, 1.2, 5), mat(0x8a6a48));
  stick.rotation.z = 0.5 + (i % 3) * 0.06; stick.rotation.y = (i / logCount) * Math.PI * 2;
  stick.position.y = 0.3;
  fire.add(stick);
}
const flameScale = 1 + warmth * 0.055;                 // the week grows the flame
// THE FLAME (2026-07-16): two crossed additive planes wearing a painted
// teardrop gradient, flickering in the loop — the orange cone is retired.
const FLAME_TEX = (() => {
  const c = document.createElement('canvas'); c.width = 64; c.height = 128;
  const x = c.getContext('2d');
  const gr = x.createRadialGradient(32, 96, 4, 32, 78, 78);
  gr.addColorStop(0, 'rgba(255,246,200,1)');
  gr.addColorStop(0.25, 'rgba(255,196,90,0.95)');
  gr.addColorStop(0.55, 'rgba(255,124,40,0.55)');
  gr.addColorStop(1, 'rgba(120,30,0,0)');
  x.fillStyle = gr;
  x.beginPath();

      const h = HEIGHTS[r.id] ?? 1.9;
      const mesh = gltf.scene;
      // rigged casts report degenerate bind-pose bboxes (the skinned-mesh
      // lesson) — measure by the bone spread when a skeleton is present
      mesh.updateMatrixWorld(true);
      let minY = Infinity, maxY = -Infinity, boned = false;
      const _p = new THREE.Vector3();
      mesh.traverse(o => { if (o.isBone || o.type === 'Bone') {
        boned = true; o.getWorldPosition(_p);
        if (_p.y < minY) minY = _p.y; if (_p.y > maxY) maxY = _p.y;
      }});
      let rawH, rawMin;

      else {

      mesh.position.y = -rawMin * s; // feet on the sand

const ray = new THREE.Raycaster();
let downAt = null;
renderer.domElement.addEventListener('pointerdown', e => downAt = { x: e.clientX, y: e.clientY });
renderer.domElement.addEventListener('pointerup', e => {
  if (!downAt || Math.hypot(e.clientX - downAt.x, e.clientY - downAt.y) > 8) return;
  const v = new THREE.Vector2((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  ray.setFromCamera(v, camera);
  // BUILD MODE eats the tap: place on terrain/blocks, or break blocks
  if (build.on) {
    const hits = ray.intersectObjects([...Object.values(buildMeshes), terrain]);
    const h = hits[0];
    if (!h || h.distance > 40) return;
    if (h.object === terrain) {
      if (build.breaking) return;
      const kx = Math.round(h.point.x), kz = Math.round(h.point.z);
      let i = 0; while (blocks.has(`${kx}|${i}|${kz}`) && i < 30) i++;
      if (i < 30) setBlock(`${kx}|${i}|${kz}`, build.type);
      return;
    }
    // an existing block: break it, or grow from the tapped face
    const k = h.object.userData.keys[h.instanceId];
    if (!k) return;
    if (build.breaking) return setBlock(k, null);
    const [kx, i, kz] = k.split('|').map(Number);
    const n = h.face.normal;
    let nk;
    if (n.y > 0.5) nk = `${kx}|${i + 1}|${kz}`;
    else if (n.y < -0.5) nk = i > 0 ? `${kx}|${i - 1}|${kz}` : null;
    else nk = `${kx + Math.round(n.x)}|${i}|${kz + Math.round(n.z)}`;
    if (nk && !blocks.has(nk) && i < 30) setBlock(nk, build.type);
    return;
  }
  for (const r of robots) {
    if (r.userData.card && ray.intersectObject(r.userData.card).length) return speak(r);
  }
});

    s.onclick = () => { setPlayerTint(t); toneRow.querySelectorAll('button').forEach(x => x.style.borderColor = ((x.dataset.tone === 'none' ? null : x.dataset.tone) === (myTint || null)) ? '#0E7C7C' : 'rgba(0,0,0,0.15)'); };
    toneRow.appendChild(s);
  }
  toneWrap.appendChild(toneRow);
  fitEl.appendChild(toneWrap);
});

// ── THE NAMED PLACES — "meet me at our rock" (the captain's vision, verbatim:
// "the wife can say, hey, meet me at the rock on the other side of the island,
// our rock, and we can do the breathing exercise together"). Real places with
// real names, always rendered; the rally system below makes them meeting
// points across devices. ─────────────────────────────────────────────────────
// The island's address book. "Meet me at the waterfall" only works if a place
// has a name both phones know — the Rally below turns a name into a beacon.
//
// The Lookout, the Forge and the Wreck Beach were here before the origin was
// written, and turned out to BE the origin's geography: the post a robot wore
// smooth over twenty-four years of watching an empty sea; the Collier's forge
// country on the spine; the sand fourteen people woke on in 1954.
//
// Added 2026-07-14 — the places the story needs and the island lacked:
//   waterfall · the S4 climax (the cave behind it) and the place Lance named
//              first, without thinking, when he described what this app is for
//   totem     · the reward. Every milestone a family finishes together carves
//              a name. It never resets. The origin's last image.
//   workshop  · the boy's shed. THE TOOLS WILL ANSWER, cut an inch deep.
const LANDMARKS = [
  { id: 'our_rock',    name: 'Our Rock',        emoji: '🪨', x: 78,  z: -62 },
  { id: 'quiet_cove',  name: 'The Quiet Cove',  emoji: '🌊', x: -80, z: -20 },
  { id: 'lookout',     name: 'The Lookout',     emoji: '🔭', x: 30,  z: -85 },
  { id: 'wreck_beach', name: 'The Wreck Beach', emoji: '⛵', x: -6,  z: 96 },
  { id: 'forge',       name: 'The Forge',       emoji: '⚒️', x: -34, z: -44 },
  // the landmark sits at the POOL, not the cliff — it's where you stand when
  // you say "meet me at the waterfall", and where a beacon has to land
  { id: 'waterfall',   name: 'The Waterfall',   emoji: '💧', x: -52, z: -18 },
  { id: 'totem',       name: 'The Totem',       emoji: '🪵', x: 6,   z: 86 },
  { id: 'workshop',    name: 'The Workshop',    emoji: '🔧', x: -20, z: -64 },
];
// Places that build their own body below get no marker stone — a cairn in
// front of a waterfall would just be litter.
const BUILT_LANDMARKS = new Set(['waterfall', 'totem', 'workshop']);
for (const lm of LANDMARKS) {
  const ly = groundY(lm.x, lm.z);
  const g = new THREE.Group();
  if (!BUILT_LANDMARKS.has(lm.id)) {
    const rock = new THREE.Mesh(
      new THREE.DodecahedronGeometry(lm.id === 'our_rock' ? 1.5 : 0.7),
      mat(lm.id === 'our_rock' ? 0x8D9AA5 : 0xA9B4BC)
    );
    rock.position.y = lm.id === 'our_rock' ? 0.9 : 0.4;
    rock.rotation.set(0.3, lm.x, 0.2);
    g.add(rock);
  }
  const lmTag = nameTag(`${lm.emoji} ${lm.name}`, '#475569');
  lmTag.position.y = lm.id === 'waterfall' ? 9.5 : lm.id === 'totem' ? 5.4 : 2.2;
  g.add(lmTag);
  g.position.set(lm.x, ly, lm.z);
  scene.add(g);
  lm.pos = new THREE.Vector3(lm.x, ly, lm.z);
}

// ── THE WATERFALL, AND THE CAVE BEHIND IT ───────────────────────────────────
// The S4 climax lives here: the youngest goes missing in the storm, the family
// search ends at this cave, and inside is the child — asleep, warm, safe —
// with Barnacle pressed against them (built by a boy who wanted one friend who
// could not be given back) and the Collier tending a fire, because he is the
// only one of them who can be awake at night. And scratched on the wall by a
// nine-year-old in 1954: T. BRENNAN. Barnacle just did it again, seventy-two
// years later, for a child whose great-grandparents weren't born. Nobody told
// him to. He never stopped.
//
// It is also the address in Lance's own sentence — "let's meet at the waterfall
// and finish challenge 10" — so it has to be a place you can stand in.
//
// THE TERRAIN PROBLEM, measured (do not re-derive this the hard way):
// islandHeight() is smooth everywhere. The "rocky spine" is a RAMP — at x=-52
// it climbs 19.3→25.9 between z=-8 and z=-35, about a 30% grade, and the
// cross-slope matches. There is no cliff anywhere on this island, and we cannot
// carve one: the terrain law is shared with the VR island and the board, and
// Build Mode's voxels key to a deterministic grid over it. Move the ground and
// every fort a family ever raised floats or buries.
//
// So the rock brings its own drop. Two consequences, both learned by looking:
//   · A flat pool disc CANNOT sit on a ramp — an 8m pool spans 2.5m of fall and
//     renders as a floating crescent. A plunge pool needs a rim. The rim is
//     built from rocks seated on real ground, each sized to reach the water.
//   · Every y here is computed against groundY AT THAT POINT, never against the
//     group's single base. That was the original bug.
const fallsAnim = [];
{
  const lm = LANDMARKS.find(l => l.id === 'waterfall');
  const base = groundY(lm.x, lm.z);
  const g = new THREE.Group();
  g.position.set(lm.x, base, lm.z);
  // local ground, relative to the group's origin — the only honest way to seat
  // anything on a hill that is never level
  const lg = (dx, dz) => groundY(lm.x + dx, lm.z + dz) - base;

  // The pool's surface. It sits ABOVE the landmark's ground on purpose: across
  // an 8m basin this ramp drops ~3m, so any waterline low enough to look right
  // downhill is buried in dirt uphill. A real plunge pool solves this with a
  // rock basin, so this one does too — the rim below holds the head, and you
  // wade in from the low side. Raising this without resizing the rim floats it.
  const WATER_Y = 1.3;
  const TOP     = 8.9;     // the lip
  const FACE_Z  = -4.0;    // where the water falls

  // ── the rock. Two pillars and a lintel, so the gap between them is the cave
  // mouth and the water falls across it. Sunk 3.5 below the pool so no corner
  // can lift off the ramp.
  const rock = mat(0x77848D);
  for (const dx of [-3.2, 3.2]) {
    const pillar = new THREE.Mesh(new THREE.BoxGeometry(2.6, 13, 3.2), rock);
    pillar.position.set(dx, 2.9, -5.6);
    g.add(pillar);
  }
  const lintel = new THREE.Mesh(new THREE.BoxGeometry(9, 4.6, 3.2), rock);
  lintel.position.set(0, 7.0, -5.6);   // spans y 4.7 → 9.3; the mouth is under it
  g.add(lintel);

  // faceted crown + shoulders, in the island's own low-poly language, so the
  // outcrop breaks its silhouette instead of reading as a concrete bunker
  const crown = [
    [-4.6, 8.2, -5.2, 2.1], [4.6, 8.4, -5.4, 2.3], [0, 9.4, -6.4, 1.9],
    [-2.6, 9.1, -4.9, 1.5], [2.8, 9.0, -5.1, 1.6],
    [-5.6, 4.0, -3.4, 2.6], [5.6, 4.4, -3.6, 2.8],
    [-6.4, 1.4, -1.0, 2.2], [6.4, 1.8, -1.2, 2.4],
  ];
  for (const [dx, dy, dz, s] of crown) {
    const r = new THREE.Mesh(new THREE.DodecahedronGeometry(s), rock);
    r.position.set(dx, dy, dz);
    r.rotation.set(dx * 0.4, dz * 0.7, dy * 0.3);
    g.add(r);
  }

  // ── the falling water. Lance's real turquoise, scrolling. Two sheets so it
  // reads as volume from the front AND from inside the cave looking out.
  //
  // Two things here look like style and are load-bearing:
  //  · tile() and NOT texWater.clone(). A clone taken at module-eval copies a
  //    texture whose image hasn't downloaded yet; the image later bumps the
  //    ORIGINAL's version, never the clone's, so the clone uploads empty and the
  //    falls render pure black. The pool works only because it uses texWater
  //    directly. This cost an afternoon — don't "simplify" it back to a clone.
  //  · MeshBasicMaterial and NOT Lambert. The sun sits at (30, 50, -20) — it
  //    lights the BACK of this cliff. A +z-facing Lambert plane gets no
  //    directional light at all and reads as a black slab. Falling water is
  //    bright anyway; unlit is both correct and the only thing that works here.
  const fallMat = new THREE.MeshBasicMaterial({
    map: tile('/island3d/tex/water.jpg', 1),
    transparent: true, opacity: 0.78, side: THREE.DoubleSide,
  });
  fallMat.map.repeat.set(1, 3);
  const FALL_H = TOP - WATER_Y;
  for (const dz of [0, -0.45]) {
    const sheet = new THREE.Mesh(new THREE.PlaneGeometry(4.6, FALL_H), fallMat);
    sheet.position.set(0, WATER_Y + FALL_H / 2, FACE_Z + dz);
    g.add(sheet);
  }
  // both sheets share fallMat — push it ONCE or the scroll runs twice a frame
  fallsAnim.push({ material: fallMat });

  // ── the pool, and the rim that makes it possible on a hillside.
  const pool = new THREE.Mesh(new THREE.CircleGeometry(3.8, 22), new THREE.MeshLambertMaterial({
    map: texWater, transparent: true, opacity: 0.82,
  }));
  pool.rotation.x = -Math.PI / 2;
  pool.position.set(0, WATER_Y, -1.2);   // under the fall, so the water lands IN it
  g.add(pool);

  // the rim: rocks around the downhill arc, each seated on the ground it
  // actually stands on and stretched to just clear the waterline. The ramp is
  // why this loop exists — a fixed ring would float on one side and bury on the
  // other. Note the scale.y: size the rock by RADIUS to reach the ground and it
  // bulges in plan too, and the pool turns into a stone fountain. Keep it
  // slender in plan and stretch it vertically instead.
  // OUT is the steepest way down from the pool, measured off the real terrain.
  // The rim opens there — that's the outlet, and it is also (not by accident)
  // the way a player walks up. A closed rim on a hillside is a wall of rock:
  // from 14m downhill at eye height you see a sliver of water and no pool.
  const OUT = (() => {
    const e = 1.5, x = lm.x, z = lm.z;
    const gx = (groundY(x + e, z) - groundY(x - e, z)) / (2 * e);
    const gz = (groundY(x, z + e) - groundY(x, z - e)) / (2 * e);
    const m = Math.hypot(gx, gz) || 1;
    return [-gx / m, -gz / m];
  })();
  for (let i = 0; i < 22; i++) {
    const a = (i / 22) * Math.PI * 2;
    const wob = 0.82 + ((i * 37) % 11) / 24;                 // deterministic jitter
    const rad = 4.25 + ((i * 53) % 7) / 12;
    const dx = Math.sin(a) * rad, dz = -1.2 + Math.cos(a) * rad;
    if (dz < -4.2) continue;                                  // that arc is the rock face
    if (Math.sin(a) * OUT[0] + Math.cos(a) * OUT[1] > 0.72) continue;   // the outlet
    const top = WATER_Y + 0.35 + ((i * 29) % 5) / 12;         // a ragged waterline
    const bottom = lg(dx, dz) - 0.6;                          // bite into the real ground
    const r = 0.95 * wob;
    const stone = new THREE.Mesh(new THREE.DodecahedronGeometry(r), mat(0x8D9AA5));
    stone.position.set(dx, (top + bottom) / 2, dz);
    stone.scale.y = Math.max(1, (top - bottom) / (2 * r));
    stone.rotation.set(a * 0.4, a * 2.3, a * 0.2);
    g.add(stone);
  }

  // ── THE STREAM. A basin on a 30% ramp with no outlet is a bathtub on a roof.
  // The water leaves by the gap in the rim and finds its own way down by
  // steepest descent — no authored path, so it runs where water would run and
  // it can never disagree with the terrain.
  //
  // It also does the app a quiet favour: follow the water uphill and you find
  // the falls. No map, no marker, no line of dialogue. Built in WORLD space —
  // it leaves the waterfall's group behind almost immediately.
  {
    const STEP = 1.4;
    const pts = [];
    // start at the rim's lip, measured from the POOL's centre, not the landmark
    let sx = lm.x + OUT[0] * 3.6, sz = (lm.z - 1.2) + OUT[1] * 3.6, run = 0;
    const POOL_TOP = base + WATER_Y;
    for (let i = 0; i < 80; i++) {
      const e = 1.5;
      const gx = (groundY(sx + e, sz) - groundY(sx - e, sz)) / (2 * e);
      const gz = (groundY(sx, sz + e) - groundY(sx, sz - e)) / (2 * e);
      const m = Math.hypot(gx, gz);
      if (m < 0.03) break;                                  // flat — it has arrived
      // the spillway: the first few metres pour out of the basin at 1.2/m until
      // they meet the hill, then the stream simply lies on the ground
      pts.push([sx, Math.max(groundY(sx, sz) + 0.1, POOL_TOP - run * 2.0), sz]);
      if (groundY(sx, sz) <= SEA_Y + 0.4) break;            // it reached the sea
      sx -= (gx / m) * STEP; sz -= (gz / m) * STEP; run += STEP;
    }
    if (pts.length > 2) {
      const pos = [], uv = [], idx = [];
      for (let i = 0; i < pts.length; i++) {
        const [x, y, z] = pts[i];
        const [nx, , nz] = pts[Math.min(i + 1, pts.length - 1)];
        const [bx, , bz] = pts[Math.max(i - 1, 0)];
        let tx = nx - bx, tz = nz - bz;
        const tl = Math.hypot(tx, tz) || 1; tx /= tl; tz /= tl;
        // narrow at the lip — a 2.7m ribbon starting 2m above the hillside is a
        // floating slab, not a spout. It widens once it's on the ground.
        const w = Math.min(1.25, 0.4 + i * 0.14);
        const ox = -tz * w, oz = tx * w;
        // each bank rides its own ground — the cross-slope is 31% too
        pos.push(x + ox, Math.max(y, groundY(x + ox, z + oz) + 0.1), z + oz,
                 x - ox, Math.max(y, groundY(x - ox, z - oz) + 0.1), z - oz);
        uv.push(0, i * 0.5, 1, i * 0.5);
      }
      for (let i = 0; i < pts.length - 1; i++) {
        const a0 = i * 2, b0 = a0 + 1, a1 = a0 + 2, b1 = a0 + 3;
        idx.push(a0, b0, a1, b0, b1, a1);
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
      geo.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));
      geo.setIndex(idx);
      geo.computeVertexNormals();
      const streamMat = new THREE.MeshBasicMaterial({
        map: tile('/island3d/tex/water.jpg', 1),
        transparent: true, opacity: 0.72, side: THREE.DoubleSide,
      });
      streamMat.map.repeat.set(1, 1);
      scene.add(new THREE.Mesh(geo, streamMat));
      fallsAnim.push({ material: streamMat });
    }
  }

  // mist where it lands
  for (let i = 0; i < 8; i++) {
    const m = new THREE.Mesh(new THREE.SphereGeometry(0.6 + Math.random() * 0.6, 6, 5),
      new THREE.MeshLambertMaterial({ color: 0xE8F4F6, transparent: true, opacity: 0.2 }));
    m.position.set((Math.random() - 0.5) * 4.5, WATER_Y + 0.3 + Math.random() * 1.6, -3.4 + Math.random() * 2.8);
    g.add(m);
  }

  // ── THE CAVE. The mouth is the gap under the lintel, behind the water.
  //
  // IT HAS NO FLOOR, on purpose. The player's y is always groundY(x, z) — they
  // walk on the island and can stand on nothing else. A built floor above the
  // terrain puts the stone over their head; below it, the hill erupts through
  // it (the ground climbs to +4.2 local across this footprint). So the island's
  // own ground IS the floor, and the cave is a shell standing on it.
  //
  // The dark mat is not decoration either: this world has no shadow maps (it
  // must hold 60fps on a phone at the end of a workday), so an interior that
  // isn't painted dark is lit exactly like the hillside outside it. A cave has
  // to be painted, not lit.
  const dark = mat(0x2A2622), floorMat = mat(0x3A3128);
  {
    const fg = new THREE.PlaneGeometry(4.2, 8, 6, 12);
    fg.rotateX(-Math.PI / 2);
    const pa = fg.attributes.position;
    for (let i = 0; i < pa.count; i++) pa.setY(i, lg(pa.getX(i), pa.getZ(i) - 7.7) + 0.05);
    fg.computeVertexNormals();
    const floor = new THREE.Mesh(fg, mat(0x2E2620));
    floor.position.set(0, 0, -7.7);
    g.add(floor);
  }
  const caveBack = new THREE.Mesh(new THREE.BoxGeometry(4.2, 7, 0.5), dark);
  caveBack.position.set(0, 3.4, -11.7);
  g.add(caveBack);
  // the ceiling rides the floor. A flat one can't work: the ground climbs 1.4m
  // over the cave's depth, so a flat ceiling is either headroom at the mouth and
  // 1.3m at the back, or it hangs below the lintel and the mouth shuts.
  {
    const cg = new THREE.PlaneGeometry(4.2, 8, 6, 12);
    cg.rotateX(Math.PI / 2);                       // face down
    const pa = cg.attributes.position;
    for (let i = 0; i < pa.count; i++) pa.setY(i, lg(pa.getX(i), pa.getZ(i) - 7.7) + 2.9);
    cg.computeVertexNormals();
    const top = new THREE.Mesh(cg, dark);
    top.position.set(0, 0, -7.7);
    g.add(top);
  }
  // INSIDE the pillars' inner faces (x = ±1.9), or the sunlit rock shows through
  // and the cave has pale grey walls
  for (const sx of [-1.85, 1.85]) {
    const w = new THREE.Mesh(new THREE.BoxGeometry(0.5, 7, 8), floorMat);
    w.position.set(sx, 3.4, -7.7);
    g.add(w);
  }

  // the Collier's fire — the one light on this island that is awake at night.
  // Seated on the real ground, like everything else here.
  const fire = new THREE.Mesh(new THREE.ConeGeometry(0.55, 1.5, 7),
    new THREE.MeshBasicMaterial({ color: 0xFFA94D }));
  fire.position.set(0, lg(0, -8.8) + 0.8, -8.8);
  g.add(fire);
  const fireLight = new THREE.PointLight(0xFFB05C, 1.2, 13);
  fireLight.position.set(0, lg(0, -8.8) + 1.6, -8.8);
  g.add(fireLight);
  fallsAnim.push({ isFire: true, fire, fireLight });

  // T. BRENNAN — scratched on the back wall by a nine-year-old in 1954, at the
  // height a nine-year-old reaches. The reveal is a name on a wall. Nobody says
  // a word about it.
  const scratch = carvedText('T. BRENNAN · 1954', '#C8B89A', 26);
  scratch.position.set(0, lg(0, -11.45) + 1.35, -11.4);
  g.add(scratch);

  // BARNACLE, still here. He sticks to whoever is having the worst day and cannot
  // be pried off with a bar — Elias built one friend who could not be given back.
  // He kept the Brennan boy alive in this cave one long night in '54, and he never left. He
  // is why the fire is always laid ready: he waits by it for whoever the sea sends
  // next. A small wooden robot, tending, patient. Walk behind the water and he's
  // there — the milestone-25 beat, standing, no dialogue needed.
  {
    const bg = new THREE.Group();
    const bx = 1.35, bz = -8.4, by = lg(bx, bz);
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.8, 0.6), mat(0x6E5636));
    body.position.y = 0.5; bg.add(body);
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.5, 0.5), mat(0x7A5E3C));
    head.position.y = 1.12; bg.add(head);
    for (const ex of [-0.13, 0.13]) {            // green bottle-glass knot-eyes
      const eye = new THREE.Mesh(new THREE.SphereGeometry(0.075, 8, 6),
        new THREE.MeshBasicMaterial({ color: 0x6FBF73 }));
      eye.position.set(ex, 1.16, 0.26); bg.add(eye);
    }
    for (const ax of [-0.45, 0.45]) {            // stubby arms, one reaching to the warmth
      const arm = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.5, 0.16), mat(0x6E5636));
      arm.position.set(ax, 0.55, 0.1); arm.rotation.x = -0.5; bg.add(arm);
    }
    bg.position.set(bx, by, bz);
    bg.lookAt(0, by + 0.5, -8.8);                 // turned toward his fire
    g.add(bg);
  }

  scene.add(g);
}
// ── DRIFTWOOD CITY ──────────────────────────────────────────────────────────
//
// Chapter 18, "The City Stands Up":
//
//   "They found it on the second day, going inland for water: a city. Empty.
//    Perfect. Wooden. The waterwheel turning. The clocks running. Streets, and
//    benches, and a park, and HUNDREDS OF LAMPS THAT HAD NEVER BEEN LIT."
//   "Kathleen Brennan said, 'There's people here,' and cried with relief, and
//    there were no people there."
//
// Nine robots. Ninety-seven tools. Decades, and nobody coming. They built an
// instrument for every gift the boy gave them and never had one guest.
//
// So the city is HERE FROM DAY ONE and it is DARK. You walk its streets while it
// isn't yours. Chapter 19: "The Jumble watched you argue on the beach. We don't
// help storms." Every milestone the family truly closes brings one place up. At
// 31 — The Naming of the Boat — the whole thing comes on.
//
// THE PLACES ARE NOT TERRAIN. Mount Driftwood is not a mountain: it's the
// robots' timber climb. Echo Canyon is not a canyon: it's a narrow street between
// tall walls, built that way because Echo-2 needed somewhere to work. Mirror Lake
// is not a lake: it's a wooden reservoir, mirror-still BECAUSE it's engineered.
// Every "natural" feature of this city is a machine for a feeling. That is why it
// is wooden, and why it hums with running water.
//
// Coordinates come from /city/driftwood-city.json, generated from
// src/data/driftwoodCity.ts — the ONE geography. The board and VR read the same
// numbers. Before this each world placed the city itself and they had already
// drifted to sharing almost nothing. qa:island-mirror asserts it now.
const CITY_ANIM = [];
const CITY_LIT = [];   // { lightsAt, lamp, glow } — raised by the milestone log
// The city wears real wood now (2026-07-16): one plank tile, tinted three
// ways — the map multiplies the color, so the grain reads without three
// texture fetches.
const texCityPlank = tile('/island3d/tex/planks.jpg', 2);
const M_TIMBER = new THREE.MeshLambertMaterial({ map: texCityPlank, color: 0xC1A078 });
const M_PLANK  = new THREE.MeshLambertMaterial({ map: texCityPlank, color: 0xE2C093 });
const M_DARK   = new THREE.MeshLambertMaterial({ map: texCityPlank, color: 0x8A6B4C });

function closedCount() {
  try {
    const s = JSON.parse(localStorage.getItem('driftwood_milestone_log_v1') || 'null');
    return Array.isArray(s?.closed) ? s.closed.length : Array.isArray(s) ? s.length : 0;
  } catch { return 0; }
}

// the glow a lamp throws — one shared radial texture, made once
const HALO_TEX = (() => {
  const c = document.createElement('canvas'); c.width = c.height = 64;
  const x = c.getContext('2d');
  const gr = x.createRadialGradient(32, 32, 0, 32, 32, 32);
  gr.addColorStop(0, 'rgba(255,232,180,1)');
  gr.addColorStop(0.35, 'rgba(255,190,110,0.5)');
  gr.addColorStop(1, 'rgba(255,170,90,0)');
  x.fillStyle = gr; x.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(c);
})();

// A lamp on a post. Unlit until the family earns it — this is the whole reward.
//
// The glow is a SPRITE, not a PointLight. Twenty-seven PointLights compile into
// the shader of every lit material in the world, and this app has to hold 60fps
// on a phone at the end of somebody's workday. A halo costs one additive quad,
// reads warmer than a light, and never touches the shader. The Heart's ember is
// the only real light the city gets — which is also the Collier's law: exactly
// one thing here is awake at night.
function cityLamp(g, x, y, z, lightsAt) {
  const post = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.09, 2.9, 6), M_DARK);
  post.position.set(x, y + 1.45, z);
  g.add(post);
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.46, 0.42),
    new THREE.MeshBasicMaterial({ color: 0x2E2822 }));   // dark glass. Never lit.
  head.position.set(x, y + 3.05, z);
  g.add(head);
  const halo = new THREE.Sprite(new THREE.SpriteMaterial({
    map: HALO_TEX, transparent: true, opacity: 0, depthWrite: false,
    blending: THREE.AdditiveBlending,
  }));
  halo.scale.setScalar(3.4);
  halo.position.set(x, y + 3.05, z);
  g.add(halo);
  CITY_LIT.push({ lightsAt, head, halo });
  return head;
}

fetch('/city/driftwood-city.json').then(r => r.json()).then(city => {
  const byRegion = {};
  for (const p of city.places) (byRegion[p.region] ||= []).push(p);
  const region = Object.fromEntries(city.regions.map(r => [r.id, r]));

  for (const p of city.places) {
    const y = groundY(p.x, p.z);
    const g = new THREE.Group();
    g.position.set(p.x, y, p.z);
    g.rotation.y = (p.x * 0.7 + p.z * 0.3) % Math.PI;   // stable, never random

    // the body — a wooden building, sized by what it's for. Sunk 0.3 into the
    // ground: nothing on this island stands on level earth.
    const w = 3.4 + (Math.abs(p.x * 7 + p.z * 13) % 11) / 6;
    const h = 2.6 + (Math.abs(p.x * 3 + p.z * 5) % 9) / 4;
    const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, w * 0.85), M_TIMBER);
    body.position.y = h / 2 - 0.65;
    g.add(body);
    const roof = new THREE.Mesh(new THREE.ConeGeometry(w * 0.82, 1.5, 4), M_DARK);
    roof.position.y = h + 0.1; roof.rotation.y = Math.PI / 4;
    g.add(roof);
    // a dark doorway — every one of them stands open. They never had a lock
    // either, and they never had a visitor.
    const door = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.7, 0.15), mat(0x241A12));
    door.position.set(0, 0.2, w * 0.43);
    g.add(door);

    // the sign, and the lamp that has never been lit
    const sign = nameTag(`${p.glyph} ${p.name}`, region[p.region]?.color || '#475569');
    sign.position.y = h + 1.55;
    g.add(sign);
    cityLamp(g, w * 0.62, 0, w * 0.5, p.lightsAt);

    scene.add(g);
  }

  // THE HEART — the city's centre, where the flume arrives and the wheels turn.
  // "The whole thing humming very faintly with running water, like a held note."
  {
    const hx = -8, hz = 18, hy = groundY(hx, hz);
    const g = new THREE.Group();
    g.position.set(hx, hy, hz);
    const plinth = new THREE.Mesh(new THREE.CylinderGeometry(3.2, 3.8, 1.2, 10), M_PLANK);
    plinth.position.y = 0.2; g.add(plinth);
    // stacked driftwood, the way a totem is stacked
    for (let i = 0; i < 5; i++) {
      const s = 2.4 - i * 0.36;
      const b = new THREE.Mesh(new THREE.BoxGeometry(s, 0.8, s), i % 2 ? M_TIMBER : M_PLANK);
      b.position.y = 1.2 + i * 0.82;
      b.rotation.y = i * 0.5;
      g.add(b);
    }
    // the ember. It breathes, and it is the ONE light the robots kept burning —
    // the Collier's law: something has to be awake at night.
    const ember = new THREE.Mesh(new THREE.SphereGeometry(0.62, 9, 7),
      new THREE.MeshBasicMaterial({ color: 0xFF9A3C }));
    ember.position.y = 5.6; g.add(ember);
    const emberLight = new THREE.PointLight(0xFFA94D, 1.4, 26);
    emberLight.position.y = 5.6; g.add(emberLight);
    CITY_ANIM.push({ t: 'ember', ember, emberLight });

    // four wheels in the moat, turning on the water the flume brings
    for (let i = 0; i < 4; i++) {
      const a = (i / 4) * Math.PI * 2 + 0.79;
      const wheel = new THREE.Group();
      wheel.add(new THREE.Mesh(new THREE.TorusGeometry(1.1, 0.09, 5, 12), M_TIMBER));
      for (let k = 0; k < 8; k++) {
        const ka = (k / 8) * Math.PI * 2;
        const pad = new THREE.Mesh(new THREE.BoxGeometry(0.44, 0.26, 0.1), M_PLANK);
        pad.position.set(Math.cos(ka) * 1.1, Math.sin(ka) * 1.1, 0);
        pad.rotation.z = ka;
        wheel.add(pad);
      }
      wheel.position.set(Math.sin(a) * 4.4, 1.2, Math.cos(a) * 4.4);
      wheel.rotation.y = a;
      g.add(wheel);
      CITY_ANIM.push({ t: 'wheel', wheel });
    }
    const tag = carvedText('THE HEART OF DRIFTWOOD', '#E8D9B5', 22);
    tag.position.set(0, 5.0, 3.9);
    g.add(tag);
    scene.add(g);
  }

  // THE FLUME — the aqueduct. The city stands on the only flat ground here and
  // the falls are 40m away uphill, so the robots CARRIED THE WATER TO IT. Nine
  // robots, 97 tools, decades and nobody coming: of course they built one. It is
  // also the island's spine of meaning — Skip's secret at milestone 4 is the
  // source of everything the family is later given. Follow it either way and you
  // find the other half of the story.
  {
    const wf = LANDMARKS.find(l => l.id === 'waterfall');
    const A = [wf.x + 2, wf.z + 2], B = [-8, 18];          // the falls → the Heart
    const N = 22;
    const g = new THREE.Group();
    for (let i = 0; i < N; i++) {
      const t0 = i / N, t1 = (i + 1) / N;
      const p0 = [A[0] + (B[0] - A[0]) * t0, A[1] + (B[1] - A[1]) * t0];
      const p1 = [A[0] + (B[0] - A[0]) * t1, A[1] + (B[1] - A[1]) * t1];
      // the channel falls gently and steadily from the pool to the Heart — that
      // is what an aqueduct IS: it refuses the ground's opinion
      const y0 = groundY(wf.x, wf.z) + 2.2 - t0 * 7.0;
      const mid = [(p0[0] + p1[0]) / 2, (p0[1] + p1[1]) / 2];
      const len = Math.hypot(p1[0] - p0[0], p1[1] - p0[1]) + 0.2;
      const trough = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.34, len), M_PLANK);
      trough.position.set(mid[0], y0, mid[1]);
      trough.rotation.y = Math.atan2(p1[0] - p0[0], p1[1] - p0[1]);
      g.add(trough);
      // trestles down to the real ground, every other bay
      if (i % 2 === 0) {
        const gy = groundY(mid[0], mid[1]);
        const drop = Math.max(0.4, y0 - gy);
        const leg = new THREE.Mesh(new THREE.BoxGeometry(0.16, drop, 0.16), M_DARK);
        leg.position.set(mid[0], y0 - drop / 2, mid[1]);
        g.add(leg);
      }
    }
    g.position.y = 0;
    scene.add(g);
  }

  raiseCityLights();
}).catch(() => { /* honest degradation: no city rather than a fake one */ });

// The reward. Dark until earned; at 31 the whole thing comes on.
let lastClosedN = null;
function raiseCityLights() {
  const n = closedCount();
  for (const L of CITY_LIT) {
    const lit = n >= L.lightsAt || n >= 31;   // 31 lights everything still dark
    L.head.material.color.setHex(lit ? 0xFFEAC2 : 0x2E2822);
    L.halo.material.opacity = lit ? 0.95 : 0;
  }
  // THE NIGHT THE CITY COMES ON (2026-07-16): the 31st closing earns a
  // 6-second sweep over the lit streets — hundreds of lamps, finally, because
  // one family proved they weren't a storm. Once per crossing, then back to
  // the player. Any tap ends it early.
  if (lastClosedN !== null && lastClosedN < 31 && n >= 31) startCitySweep();
  lastClosedN = n;
}
window.addEventListener('storage', raiseCityLights);

let citySweepT = -1;   // ≥0 while sweeping (drives the camera in the loop)
function startCitySweep() { citySweepT = 0; }
addEventListener('pointerdown', () => { if (citySweepT >= 0) citySweepT = -1; });

// THE HEART'S HUM — "humming very faintly with running water, like a held
// note." A generated 30s drone loop, volume by distance to the Heart. Starts
// on the first gesture (autoplay law); a missing file fails silent.
const heartHum = new Audio('/ambient/heart-hum.mp3');
heartHum.loop = true; heartHum.volume = 0;
addEventListener('pointerdown', function startHum() {
  heartHum.play().catch(() => { /* the island is quiet, honestly */ });
  removeEventListener('pointerdown', startHum);
});

// ── THE TOTEM ───────────────────────────────────────────────────────────────
// The reward, and the origin's last image. Every milestone a family finishes
// TOGETHER carves a name into it. It never resets and it never shrinks — a
// slip cannot un-cross the wake, in wood. Reads the real milestone log, so
// what's carved is what they actually did.
{
  const lm = LANDMARKS.find(l => l.id === 'totem');
  const base = groundY(lm.x, lm.z);
  const g = new THREE.Group();
  g.position.set(lm.x, base, lm.z);

  const totemWood = new THREE.MeshLambertMaterial({ map: tile('/island3d/tex/grain.jpg', 1), color: 0xD8B98C });
  const post = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.62, 4.6, 12), totemWood);
  post.position.y = 2.3;
  g.add(post);
  const cap = new THREE.Mesh(new THREE.ConeGeometry(0.8, 0.9, 12), new THREE.MeshLambertMaterial({ map: tile('/island3d/tex/grain.jpg', 1), color: 0x9A7A52 }));
  cap.position.y = 5.0;
  g.add(cap);

  // One carved band per milestone the family closed together — all 31, spaced to
  // fit the post so the full crossing is one monument (not capped at 12, which
  // hid two thirds of a finished journey). Rebuilds LIVE on the storage event,
  // the same signal that lights the city, so the totem and the city agree the
  // instant a milestone closes instead of the totem lagging until reload.
  //
  // closedCount() reads the OBJECT shape { closed: [...] }. Reading it as an
  // array gives undefined and the loop never runs — the totem stays bare while
  // looking exactly like one that is simply waiting. That was the bug.
  const bands = [];
  function recarveTotem() {
    for (const b of bands) g.remove(b);
    bands.length = 0;
    const closed = Math.min(closedCount(), 31);
    const gap = 3.4 / 31;                       // the whole crossing fits the post
    for (let i = 0; i < closed; i++) {
      const band = new THREE.Mesh(new THREE.TorusGeometry(0.56, 0.075, 6, 14), mat(0xC8A96E));
      band.rotation.x = Math.PI / 2;
      band.position.y = 0.7 + i * gap;
      g.add(band);
      bands.push(band);
    }
  }
  recarveTotem();
  window.addEventListener('storage', e => { if (!e.key || e.key === 'driftwood_milestone_log_v1') recarveTotem(); });
  scene.add(g);
}

// ── THE WORKSHOP ────────────────────────────────────────────────────────────
// The boy's shed, up in the forge country. The cot, the bench, the crate
// stencilled GULLHAVEN, the notebooks going back to 1930 — and over the door,
// cut an inch deep, the sentence Malakor found here and spent the rest of his
// life saying as if it were his own.
//
// A player who has finished L.A.N.C.E. walks in and understands what he did,
// and nobody says a word.
{
  const lm = LANDMARKS.find(l => l.id === 'workshop');
  const base = groundY(lm.x, lm.z);
  const g = new THREE.Group();
  g.position.set(lm.x, base, lm.z);   // NOT rotated: local x/z = world, so lg() is honest
  const lg = (dx, dz) => groundY(lm.x + dx, lm.z + dz) - base;
  const WOOD = mat(0x6B5236), DIM = mat(0x3E3020), DUSK = mat(0x2C2216);

  // THE SHELL — a walkable shed, not a solid block. Four walls with a doorway
  // gap on the +z face (the downhill approach), tall enough to bridge the ramp,
  // dark inside because there are no shadow maps and an unpainted interior is lit
  // like the hillside. You walk in on the island's own ground.
  // height 6, centred low so the bottom (y -2) is buried below the lowest corner
  // of this ramp — no floating downhill wall, no sea showing under the sill
  for (const [w, h, d, x, y, z] of [
    [7, 6, 0.3, 0, 1.0, -3],        // back
    [0.3, 6, 6, -3.4, 1.0, 0],      // left
    [0.3, 6, 6, 3.4, 1.0, 0],       // right
    [2.6, 6, 0.3, -2.2, 1.0, 3],    // front-left of the doorway
    [2.6, 6, 0.3, 2.2, 1.0, 3],     // front-right of the doorway
  ]) {
    const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), WOOD);
    wall.position.set(x, y, z);
    g.add(wall);
  }
  const ceil = new THREE.Mesh(new THREE.BoxGeometry(7, 0.3, 6.3), DUSK);
  ceil.position.set(0, 3.4, 0); g.add(ceil);
  // a plank floor that rides the ramp — hides the sea showing through the sloped
  // ground under the sill, and reads as a swept shop rather than a dirt lip
  {
    const fg = new THREE.PlaneGeometry(6.8, 6, 8, 8);
    fg.rotateX(-Math.PI / 2);
    const pa = fg.attributes.position;
    for (let i = 0; i < pa.count; i++) pa.setY(i, lg(pa.getX(i), pa.getZ(i)) + 0.04);
    fg.computeVertexNormals();
    const floor = new THREE.Mesh(fg, mat(0x4A3A26));
    g.add(floor);
  }
  const roof = new THREE.Mesh(new THREE.ConeGeometry(5.2, 1.8, 4), mat(0x4A3726));
  roof.position.y = 4.3; roof.rotation.y = Math.PI / 4; g.add(roof);

  // over the door, cut an inch deep — the sentence Malakor found here and spent
  // the rest of his life saying as if it were his own
  const carving = carvedText('THE TOOLS WILL ANSWER', '#E8D9B5', 24);
  carving.position.set(0, 3.0, 3.16); g.add(carving);

  // ── inside: a boy's whole life, and the shape of what was taken ──
  // the workbench, along the back wall
  const bench = new THREE.Mesh(new THREE.BoxGeometry(4.4, 0.9, 1.1), DIM);
  bench.position.set(-0.6, lg(-0.6, -2.2) + 0.45, -2.2); g.add(bench);
  const benchTop = lg(-0.6, -2.2) + 0.92;

  // THE THEFT, told without a word: everything on the bench is furred with dust
  // except one clean rectangle, the exact size of a roll of plans, lifted and
  // never set back down. A player who finished L.A.N.C.E. knows whose hand did it.
  const cleanSpot = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 0.85),
    new THREE.MeshBasicMaterial({ color: 0x8A7350 }));
  cleanSpot.rotation.x = -Math.PI / 2;
  cleanSpot.position.set(-1.4, benchTop + 0.01, -2.2); g.add(cleanSpot);

  // the 97, each a portrait of a friend: carved practice-limbs in rows on the
  // right-wall shelf, "knot-eyes in rows like a choir"
  for (let s = 0; s < 2; s++) {
    const shelf = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.12, 5), mat(0x53412C));
    shelf.position.set(3.1, lg(3.1, 0) + 1.1 + s * 1.0, -0.2); g.add(shelf);
    for (let i = 0; i < 6; i++) {
      const limb = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.5 + (i % 3) * 0.14, 0.22), mat(0x7A5E3C));
      limb.position.set(3.0, lg(3.1, 0) + 1.4 + s * 1.0, -2.4 + i * 0.86);
      limb.rotation.z = (i % 2 ? 0.12 : -0.1); g.add(limb);
    }
  }

  // the crate he came ashore with, still stencilled with the boat that failed him
  const crate = new THREE.Mesh(new THREE.BoxGeometry(1.3, 1.2, 1.2), mat(0x6E5636));
  crate.position.set(2.2, lg(2.2, 1.6) + 0.6, 1.6); g.add(crate);
  const crateTag = nameTag('GULLHAVEN', '#3E2E1A');
  crateTag.position.set(2.2, lg(2.2, 1.6) + 0.75, 2.22); crateTag.scale.setScalar(0.62); g.add(crateTag);

  // the notebooks — the 31 lessons and the 97 tools, going back to 1930, the
  // early ones a child's. Malakor took the plans; he left these. He couldn't
  // read a boy out of them.
  for (let i = 0; i < 5; i++) {
    const bk = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.12, 0.5), mat(i % 2 ? 0x8B6B3A : 0x6B4E2C));
    bk.position.set(1.3 - i * 0.03, benchTop + 0.07 + i * 0.13, -2.3); bk.rotation.y = 0.1 + i * 0.04; g.add(bk);
  }

  // his own mark, low on the back wall, where a boy signs a thing he's proud of.
  // Two names are carved on this island now: ELIAS in his shop, T. BRENNAN in
  // the cave. The maker and the boy he'd save twenty years after he was gone.
  const mark = carvedText('ELIAS', '#C8B89A', 22);
  mark.position.set(1.0, lg(1.0, -2.85) + 0.8, -2.83); mark.scale.setScalar(0.8); g.add(mark);

  // the lamp he left on — the one warm thing, still burning, nobody to turn it off
  const lamp = new THREE.PointLight(0xFFC98A, 1.1, 11);
  lamp.position.set(-0.3, benchTop + 1.3, -1.6); g.add(lamp);
  const flame = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6, 5),
    new THREE.MeshBasicMaterial({ color: 0xFFCE7A }));
  flame.position.copy(lamp.position); g.add(flame);

  scene.add(g);
}

// THE RALLY — one family member calls a place; every gathered device raises
// the beacon; arriving there TOGETHER answers it (rally_met feeds the fifth
// need — presence proven by walking, not by tapping).
let rally = null; // { spot, spotName, beacon, met }
// the island speaks with its own from-id (device id + '-island'): the app on
// THIS phone then merges island-born events into its world log like any
// family member's (its skip-guard only filters its own app-published voice),
// so TOGETHER gets fed on every device — including the caller's.
const deviceIdRaw = (() => { try { return localStorage.getItem('driftwood_device_v1') || 'dev-island'; } catch { return 'dev-island'; } })();
const islandFrom = deviceIdRaw + '-island';
function sayLine(name, line, ms = 5000) {
  document.getElementById('sayName').textContent = name;
  document.getElementById('sayLine').textContent = line;
  say.style.display = 'block';
  clearTimeout(say._t);
  say._t = setTimeout(() => { say.style.display = 'none'; }, ms);
}
function raiseRally(spotId, callerName) {
  const lm = LANDMARKS.find(l => l.id === spotId);
  if (!lm) return;
  if (rally?.beacon) scene.remove(rally.beacon);
  const beacon = new THREE.Group();
  const pillar = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12, 0.6, 12, 10, 1, true),
    new THREE.MeshBasicMaterial({ color: 0xFFB84D, transparent: true, opacity: 0.35, depthWrite: false })
  );
  pillar.position.y = 6;
  beacon.add(pillar);
  const rallyRing = new THREE.Mesh(
    new THREE.RingGeometry(2.2, 2.7, 40).rotateX(-Math.PI / 2),
    new THREE.MeshBasicMaterial({ color: 0xF59E0B, transparent: true, opacity: 0.8, side: THREE.DoubleSide })
  );
  rallyRing.position.y = 0.08;
  beacon.add(rallyRing);
  const beaconTag = nameTag('📣 meet here!', '#B45309');
  beaconTag.position.y = 3.4;
  beacon.add(beaconTag);
  beacon.position.copy(lm.pos);
  scene.add(beacon);
  rally = { spot: spotId, spotName: lm.name, beacon, met: false };
  if (callerName) sayLine(callerName, `Meet me at ${lm.name} ${lm.emoji} — I'll wait for you there!`, 6000);
}
function celebrateRallyMet() {
  if (!rally || rally.met) return;
  rally.met = true;
  sayLine('the island', `🫂 You made it to ${rally.spotName} together. The island noticed.`);
  const b = rally.beacon;
  setTimeout(() => { scene.remove(b); if (rally?.beacon === b) rally = null; }, 4800);
}
function postRallyEvent(action, payload) {
  if (!campCode) return;
  fetch(`/api/gathering/${campCode}/events`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      id: `ev-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`,
      actor: me.id, action, payload, at: new Date().toISOString(), from: islandFrom,
    }),
  }).catch(() => {});
}

// the call button — rises when you stand at a named place while gathered
const rallyEl = document.createElement('button');
rallyEl.style.cssText = 'position:fixed;left:50%;bottom:212px;transform:translateX(-50%);z-index:45;display:none;background:linear-gradient(100deg,#0E7C7C,#2E96B5);color:#fff;border:none;border-radius:999px;padding:11px 18px;font-size:12.5px;font-weight:800;box-shadow:0 4px 18px rgba(14,124,124,0.5);cursor:pointer;font-family:inherit';
rallyEl.dataset.testid = 'rally-call';
document.body.appendChild(rallyEl);
let nearLandmark = null;
rallyEl.onclick = () => {
  if (!nearLandmark) return;
  postRallyEvent('rally_called', { spot: nearLandmark.id, spotName: nearLandmark.name, name: me.name });
  raiseRally(nearLandmark.id, null);
  // "meet me at the waterfall" — the actual sentence Lance described. If we're
  // in a camp, hand the caller a link to TEXT: this is the bridge from the app
  // to a real couple's Messages thread. navigator.share on a phone; clipboard on
  // a desktop. Same-origin iframe, so both are allowed; the click is the gesture.
  if (campCode) {
    const url = `${location.origin}/?meet=${campCode}&at=${nearLandmark.id}`;
    const text = `Meet me at ${nearLandmark.name} ${nearLandmark.emoji}. Tap to walk over:`;
    const shared = (navigator.share
      ? navigator.share({ title: 'Driftwood', text, url }).then(() => true).catch(() => false)
      : Promise.resolve(false));
    shared.then(ok => {
      if (ok) return;
      navigator.clipboard?.writeText(`${text} ${url}`).catch(() => {});
      sayLine(me.name || 'You', `📲 Invite link copied — text it to your family.`, 4500);
    });
  } else {
    sayLine(me.name || 'You', `📣 The family's phones just heard it: meet at ${nearLandmark.name}.`, 4500);
  }
};

// the QA hatch (same spirit as _circleDebug): teleport + rally introspection
window._islandDebug = {
  teleport(x, z) { player.position.set(x, groundY(x, z), z); broadcastPos?.(); },
  rally: () => rally ? { spot: rally.spot, spotName: rally.spotName, met: rally.met } : null,
  landmarks: () => LANDMARKS.map(l => ({ id: l.id, name: l.name, x: l.x, z: l.z })),
  // the 31 trail stations (defined later in the file; call after load)
  trail: () => MS.map(m => { const s = milestoneSpot(m); return { n: m.n, x: s.x, z: s.z, h: islandHeight(s.x, s.z) }; }),
  // the family members this device currently sees, and their chosen looks
  others: () => { const out = []; for (const [actor, o] of others) out.push({ actor, kind: o.kind, tint: o.tint }); return out; },

  look(yaw = 0, pitch = 0.34) { camYaw = yaw; camPitch = pitch; },

      if (!o.isMesh && !o.isSprite) return;

};

function milestoneSpot(m) {

  const addr = MS_PLACE[m.id];

const gatherEl = document.createElement('button');

    const SPEED = 7.5;                     // a hiking pace for a big island
    player.position.x += Math.sin(ang) * SPEED * mag * dt;
    player.position.z += Math.cos(ang) * SPEED * mag * dt;

    // Slide along the waterline (keep whichever axis stays on land).
    if (islandHeight(player.position.x, player.position.z) < -0.2) {
      if (islandHeight(prevX, player.position.z) >= -0.2) player.position.x = prevX;
      else if (islandHeight(player.position.x, prevZ) >= -0.2) player.position.z = prevZ;

  // (solidTop makes every fort a staircase; the hop clears one block cleanly)

  let py = player.userData.baseY ?? solid;

    const wasIn = inCircle;
    // XZ distance — feet in the ring is what counts, not eye height
    inCircle = Math.hypot(player.position.x - storyCircle.position.x, player.position.z - storyCircle.position.z) < 2.2;
    if (inCircle && !wasIn) {
      if (window.parent !== window) window.parent.postMessage({ type: 'driftwood:open-milestone', id: nextMs.id }, '*');
      else speak({ userData: { info: { id: 'circle', name: 'the story circle', lines: [`⚑ Milestone ${nextMs.n} · ${nextMs.t} — open Driftwood on your phone; the shore carries this one.`] } }, position: storyCircle.position });
    }
  }

  // the waterfall falls, and the Collier's fire breathes. He runs on flame —
  // he is the only one of them who can be awake after dark, which is why he
  // sat with the boy every night for six years, and why there is a fire in
  // that cave when a lost child needs one.
  // the Heart hums louder the closer you stand (silent past 34m)
  {
    const d = Math.hypot(player.position.x + 8, player.position.z - 18);
    heartHum.volume = Math.max(0, Math.min(0.45, (1 - d / 34) * 0.45));
  }

  // the family's fire flickers — scale + sway on the crossed planes
  for (const fl of FIRE_FLAMES) {
    fl.scale.y = flameScale * (0.92 + Math.sin(t * 9.7) * 0.1 + Math.sin(t * 23.3) * 0.05);
    fl.scale.x = fl.scale.z = flameScale * (0.95 + Math.sin(t * 13.1) * 0.07);
    fl.rotation.y += dt * 0.6;
  }

  // the city breathes: the Heart's ember, and the wheels the flume turns
  for (const c of CITY_ANIM) {
    if (c.t === 'ember') {
      const b = 1.25 + Math.sin(t * 1.5) * 0.35;
      c.emberLight.intensity = b;
      c.ember.scale.setScalar(0.94 + (b - 1.25) * 0.14);
    } else if (c.t === 'wheel') {
      c.wheel.rotation.x += dt * 0.7;
    }
  }

  for (const f of fallsAnim) {
    if (f.isFire) {
      const b = 1.3 + Math.sin(t * 5.5) * 0.18 + Math.sin(t * 11.3) * 0.09;
      f.fireLight.intensity = b;
      f.fire.scale.y = 0.9 + (b - 1.3) * 0.5;
    } else if (f.material?.map) {
      f.material.map.offset.y = (f.material.map.offset.y - dt * 1.6) % 1;
    }
  }

  if (citySweepT >= 0) {
    // the night the city comes on: a slow arc over the lit streets. The
    // Heart sits at (-8, 18); the arc rides high enough to clear the spine.
    citySweepT += dt;
    if (citySweepT > 6) { citySweepT = -1; }
    else {
      const k = citySweepT / 6;
      const a = -0.6 + k * 1.7;
      const sx = -8 + Math.sin(a) * 34, sz = 18 + Math.cos(a) * 34;
      camera.position.set(sx, Math.max(24 - k * 6, groundY(sx, sz) + 3), sz);
      camera.lookAt(-8, groundY(-8, 18) + 4, 18);
    }
  } else if (FREE_CAM) {
    // QA has taken the camera off the player to photograph a place
    camera.position.set(...FREE_CAM.pos);
    camera.lookAt(...FREE_CAM.target);
  } else {
    // third-person camera: behind + above, orbit by drag
    const cx = player.position.x + Math.sin(camYaw) * CAM_D * Math.cos(camPitch);
    const cz = player.position.z + Math.cos(camYaw) * CAM_D * Math.cos(camPitch);
    // ride the hills with the player (never sink the camera into a slope)
    const cy = Math.max(player.position.y + 2.4 + Math.sin(camPitch) * CAM_D, groundY(cx, cz) + 1.2);
    // THE ARRIVAL (2026-07-16): the first four seconds sweep down from over
    // the water onto the camp — the island introduces itself instead of
    // opening on sand. Any input (drag/walk) cuts straight to gameplay.
    if (introT < INTRO_LEN) {
      introT += dt;
      const k = Math.min(1, introT / INTRO_LEN);
      const e = 1 - Math.pow(1 - k, 3);              // ease-out cubic
      const ix = (CAMP.x + 26) + (cx - (CAMP.x + 26)) * e;
      const iy = 22 + (cy - 22) * e;
      const iz = (CAMP.z + 34) + (cz - (CAMP.z + 34)) * e;
      camera.position.set(ix, Math.max(iy, groundY(ix, iz) + 1.5), iz);
      const ly = (1 - e) * (fire.position.y + 2.5) + e * (player.position.y + 1.2);
      camera.lookAt(
        (1 - e) * fire.position.x + e * player.position.x, ly,
        (1 - e) * fire.position.z + e * player.position.z);
    } else {
      camera.position.lerp(new THREE.Vector3(cx, cy, cz), Math.min(1, dt * 7));
      camera.lookAt(player.position.x, player.position.y + 1.2, player.position.z);
    }
  }

  renderer.render(scene, camera);
});
</script>
</body>
</html>
