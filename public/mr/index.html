<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Fire Circle — Driftwood Mixed Reality</title>
<style>
  html, body { margin: 0; height: 100%; background: #1a1410; overflow: hidden; font-family: -apple-system, system-ui, sans-serif; }
  body.ar-active { background: transparent; }
  #hud { position: fixed; top: 12px; left: 12px; color: #f3e8d8; font-size: 12px; z-index: 5;
         background: rgba(26,20,16,.68); padding: 9px 12px; border-radius: 12px; backdrop-filter: blur(6px); max-width: 330px; line-height: 1.5; }
  #hud b { color: #F2A65A; }
  #crisis { position: fixed; top: 12px; right: 12px; z-index: 6; color: #fff; background: #e11d48;
            border: 0; padding: 9px 13px; border-radius: 999px; font-weight: 800; font-size: 12px; cursor: pointer; }
  #helm { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); z-index: 5; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  #helm button { background: rgba(30,22,16,.8); color: #f3e8d8; border: 1px solid rgba(242,166,90,.4);
                 padding: 9px 14px; border-radius: 999px; font-weight: 700; font-size: 12px; cursor: pointer; backdrop-filter: blur(6px); }
  #helm button.active { background: rgba(242,166,90,.25); border-color: #F2A65A; color: #fff3e0; }
  #toolline { position: fixed; bottom: 62px; left: 50%; transform: translateX(-50%); z-index: 5; color: #ffe9b0;
              font-size: 13px; font-weight: 700; background: rgba(26,20,16,.68); padding: 7px 14px; border-radius: 999px;
              backdrop-filter: blur(6px); display: none; max-width: 84%; text-align: center; }
</style>
</head>
<body>
<!-- ═══════════════════════════════════════════════════════════════════════════
     THE FIRE CIRCLE — Driftwood's third door (the Anchorage pattern, worn by
     the family island). The phone carries the week; VR stands you on the
     island; THIS page brings the family's fire into YOUR REAL LIVING ROOM
     (Quest 3 passthrough) — burning exactly the warmth the week earned.

     LAWS (inherited, non-negotiable):
     · Crisis protocols are therapist-configured in the app's Settings →
       Safety & Crisis. No crisis flow lives in a headset — rest is allowed.
     · The fire reads the SAME driftwood_events_v1 the phones write — this
       is the reconnection loop, projected onto the family's real floor.
     · MR sessions log to their own key (driftwood_mr_sessions_v1), never
       into the family's world log — presence isn't a scored act.
     · Honest fallbacks: no AR → VR-style view → desktop preview always
       works (the Playwright door).
     ═══════════════════════════════════════════════════════════════════════ -->
<div id="hud"><b>The Fire Circle</b> · the family's fire, in your real room<br/>
  <span id="mode">checking what this device can do…</span><br/>
  <span id="warmline"></span><br/>
  <span style="color:#ffb4c0">You can take the headset off any time — this fire will keep.</span></div>
<div id="toolline"></div>
<div id="helm">
  <button data-tool="fire">🔥 Place the fire</button>
  <button data-tool="lantern">🏮 Float a lantern</button>
  <button data-tool="sit">🪵 Just sit</button>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.134.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { ARButton } from 'three/addons/webxr/ARButton.js';
import { VRButton } from 'three/addons/webxr/VRButton.js';

// ── Scene: transparent — the family's room is the world ─────────────────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.02, 40);
camera.position.set(0, 1.5, 0);
scene.add(camera);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setClearColor(0x000000, 0);
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const key = new THREE.DirectionalLight(0xFFE9C9, 0.7); key.position.set(1, 3, 2); scene.add(key);

// ── THE WARMTH — the same ledger the phones write ────────────────────────────
let warmth = 0;
try {
  const evs = JSON.parse(localStorage.getItem('driftwood_events_v1') || '[]');
  warmth = Math.min(evs.filter(e => e && e.action === 'fire_quiz_played').length, 24);
} catch { /* a cold start is still a start */ }
document.getElementById('warmline').innerHTML =
  warmth > 0
    ? `this week laid <b style="color:#F2A65A">${warmth} log${warmth === 1 ? '' : 's'}</b> on the family fire — it burns here too`
    : `the fire is small tonight — every campfire game this week makes it taller`;

// ── THE FIRE — the island's exact recipe, floor-scale ────────────────────────
const mat = (c) => new THREE.MeshLambertMaterial({ color: c });
const fire = new THREE.Group();
const logCount = 4 + Math.floor(warmth / 2);
for (let i = 0; i < logCount; i++) {
  const stick = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.024, 0.34, 5), mat(0x8a6a48));
  stick.rotation.z = 0.5 + (i % 3) * 0.06; stick.rotation.y = (i / logCount) * Math.PI * 2;
  stick.position.y = 0.085;
  fire.add(stick);
}
const flame = new THREE.Mesh(new THREE.ConeGeometry(0.085, 0.3, 7), new THREE.MeshBasicMaterial({ color: 0xFFA64D, transparent: true, opacity: 0.92 }));
flame.position.y = 0.26; flame.scale.setScalar(1 + warmth * 0.05);
fire.add(flame);
const inner = new THREE.Mesh(new THREE.ConeGeometry(0.045, 0.18, 6), new THREE.MeshBasicMaterial({ color: 0xFFE08A, transparent: true, opacity: 0.95 }));
inner.position.y = 0.22;
fire.add(inner);
const fireLight = new THREE.PointLight(0xFFA64D, 0.9 + warmth * 0.04, 3.5 + warmth * 0.12);
fireLight.position.y = 0.4;
fire.add(fireLight);
// embers
const emberGeo = new THREE.BufferGeometry();
const emberN = 26;
const emberPos = new Float32Array(emberN * 3);
emberGeo.setAttribute('position', new THREE.BufferAttribute(emberPos, 3));
const embers = new THREE.Points(emberGeo, new THREE.PointsMaterial({ color: 0xFFC178, size: 0.012, transparent: true, opacity: 0.9 }));
fire.add(embers);
const emberSeed = Array.from({ length: emberN }, () => ({ a: Math.random() * Math.PI * 2, r: 0.02 + Math.random() * 0.07, v: 0.25 + Math.random() * 0.5, o: Math.random() * 4 }));
fire.position.set(0, 0, -1.2);   // desktop preview: on the "floor" ahead
fire.visible = true;
scene.add(fire);

// stones around the circle
for (let i = 0; i < 9; i++) {
  const st = new THREE.Mesh(new THREE.DodecahedronGeometry(0.045, 0), mat(0x7d746a));
  const a = (i / 9) * Math.PI * 2;
  st.position.set(Math.cos(a) * 0.34, 0.02, Math.sin(a) * 0.34);
  st.scale.y = 0.7;
  fire.add(st);
}

// ── LANTERNS — gratitude floats to the real ceiling ─────────────────────────
const lanterns = [];
function releaseLantern() {
  const g = new THREE.Group();
  const shade = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.062, 0.11, 8, 1, true),
    new THREE.MeshBasicMaterial({ color: 0xFFB35C, transparent: true, opacity: 0.85, side: THREE.DoubleSide }));
  const glow = new THREE.PointLight(0xFFB35C, 0.45, 1.6);
  g.add(shade, glow);
  g.position.copy(fire.position).add(new THREE.Vector3((Math.random() - 0.5) * 0.4, 0.35, (Math.random() - 0.5) * 0.4));
  scene.add(g);
  lanterns.push({ g, v: 0.10 + Math.random() * 0.06, sway: Math.random() * Math.PI * 2 });
  toolline('🏮 it rises — name the thing you were glad of, out loud, to whoever is in the room.');
}

// ── the helm ─────────────────────────────────────────────────────────────────
const toollineEl = document.getElementById('toolline');
function toolline(t) {
  toollineEl.textContent = t;
  toollineEl.style.display = 'block';
  clearTimeout(toolline._t);
  toolline._t = setTimeout(() => { toollineEl.style.display = 'none'; }, 7000);
}
let placing = false;
let sitStart = null;
document.querySelectorAll('#helm button').forEach(b => b.onclick = () => {
  const tool = b.dataset.tool;
  document.querySelectorAll('#helm button').forEach(x => x.classList.toggle('active', x === b));
  if (tool === 'fire') {
    placing = true;
    toolline(renderer.xr.isPresenting
      ? 'look at your real floor — tap the trigger to set the fire circle there'
      : 'in AR you place this on your real floor; here it sits ahead of you');
  }
  if (tool === 'lantern') { placing = false; releaseLantern(); }
  if (tool === 'sit') {
    placing = false;
    sitStart = performance.now();
    toolline('🪵 just sit. the fire asks nothing. (two quiet minutes counts as tending it)');
  }
});
// ── AR placement: hit-test onto the real floor ───────────────────────────────
let hitTestSource = null, viewerSpace = null;
const reticle = new THREE.Mesh(
  new THREE.RingGeometry(0.09, 0.11, 24).rotateX(-Math.PI / 2),
  new THREE.MeshBasicMaterial({ color: 0xF2A65A, transparent: true, opacity: 0.8 })
);
reticle.visible = false;
scene.add(reticle);
renderer.xr.addEventListener('sessionstart', async () => {
  document.body.classList.add('ar-active');
  const session = renderer.xr.getSession();
  try {
    viewerSpace = await session.requestReferenceSpace('viewer');
    hitTestSource = await session.requestHitTestSource?.({ space: viewerSpace });
  } catch { /* hit-test unsupported — the fire stays where it is */ }
  session.addEventListener('select', () => {
    if (placing && reticle.visible) {
      fire.position.setFromMatrixPosition(reticle.matrix);
      placing = false;
      toolline('🔥 the family fire is in the room. ' + (warmth ? `${warmth} logs this week.` : 'small tonight — the week grows it.'));
    }
  });
  session.addEventListener('end', () => { document.body.classList.add ? document.body.classList.remove('ar-active') : 0; hitTestSource = null; });
});

// ── session log — MR's own key, never the family's world log ────────────────
function logSession() {
  try {
    const log = JSON.parse(localStorage.getItem('driftwood_mr_sessions_v1') || '[]');
    log.push({ at: new Date().toISOString(), warmth, lanterns: lanterns.length });
    localStorage.setItem('driftwood_mr_sessions_v1', JSON.stringify(log.slice(-60)));
  } catch { /* the visit still happened */ }
}
addEventListener('beforeunload', logSession);

// ── honest doors: AR → VR → desktop preview ─────────────────────────────────
const modeEl = document.getElementById('mode');
(async () => {
  if (navigator.xr) {
    try {
      if (await navigator.xr.isSessionSupported('immersive-ar')) {
        modeEl.textContent = 'Quest 3 found — START AR puts this fire on your real floor.';
        document.body.appendChild(ARButton.createButton(renderer, { requiredFeatures: ['hit-test'], optionalFeatures: ['dom-overlay'], domOverlay: { root: document.body } }));
        return;
      }
      if (await navigator.xr.isSessionSupported('immersive-vr')) {
        modeEl.textContent = 'No passthrough here — VR view offered instead (honest fallback).';
        document.body.appendChild(VRButton.createButton(renderer));
        return;
      }
    } catch { /* fall through */ }
  }
  modeEl.textContent = 'Desktop preview — drag to look. On a Quest 3 this fire sits on your real floor.';
})();

// desktop drag-look — starts tilted down so the floor fire is in frame
let yaw = 0, pitch = -0.55, dragging = false, px = 0, py = 0;
renderer.domElement.addEventListener('pointerdown', e => { dragging = true; px = e.clientX; py = e.clientY; });
addEventListener('pointerup', () => { dragging = false; });
addEventListener('pointermove', e => {
  if (!dragging || renderer.xr.isPresenting) return;
  yaw -= (e.clientX - px) * 0.004; pitch -= (e.clientY - py) * 0.003;
  pitch = Math.max(-1.1, Math.min(0.8, pitch));
  px = e.clientX; py = e.clientY;
});

// ── the loop ─────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
renderer.setAnimationLoop((_, frame) => {
  const t = clock.getElapsedTime();
  if (!renderer.xr.isPresenting) camera.rotation.set(pitch, yaw, 0, 'YXZ');

  // AR hit-test → reticle rides the real floor
  if (frame && hitTestSource) {
    const hits = frame.getHitTestResults(hitTestSource);
    if (hits.length && placing) {
      const pose = hits[0].getPose(renderer.xr.getReferenceSpace());
      reticle.visible = true;
      reticle.matrix.fromArray(pose.transform.matrix);
      reticle.matrixAutoUpdate = false;
    } else reticle.visible = false;
  }

  // the fire breathes
  flame.scale.y = (1 + warmth * 0.05) * (1 + Math.sin(t * 9.1) * 0.12);
  inner.scale.y = 1 + Math.sin(t * 11.7 + 1) * 0.18;
  fireLight.intensity = (0.9 + warmth * 0.04) + Math.sin(t * 7.3) * 0.12;
  for (let i = 0; i < emberN; i++) {
    const e = emberSeed[i];
    const life = ((t * e.v + e.o) % 1);
    emberPos[i * 3]     = Math.cos(e.a + t * 0.4) * e.r * (1 - life * 0.4);
    emberPos[i * 3 + 1] = 0.18 + life * 0.55;
    emberPos[i * 3 + 2] = Math.sin(e.a + t * 0.4) * e.r * (1 - life * 0.4);
  }
  emberGeo.attributes.position.needsUpdate = true;

  // lanterns rise and sway toward the real ceiling
  for (const l of lanterns) {
    l.g.position.y += l.v * 0.016;
    l.g.position.x += Math.sin(t + l.sway) * 0.0006;
    if (l.g.position.y > 2.6) l.v = 0;   // it rests at ceiling height
  }

  // the quiet sit — two minutes by the fire counts as tending it
  if (sitStart && performance.now() - sitStart > 120000) {
    sitStart = null;
    toolline('🔥 two quiet minutes. the fire noticed. so did you.');
  }

  renderer.render(scene, camera);
});
</script>
</body>
</html>
